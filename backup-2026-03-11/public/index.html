<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamGrab | Premium Video Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-gradients">
        <div class="gradient-blob form-blob"></div>
        <div class="gradient-blob result-blob"></div>
    </div>

    <main class="container">
        <!-- Hero Section -->
        <header class="hero">
            <h1>Download any video in <span class="text-gradient">seconds</span></h1>
            <p>Paste a YouTube URL below to instantly fetch high-quality MP4 and MP3 formats.</p>
        </header>

        <!-- Input Form -->
        <section class="glass-card form-container">
            <div class="platform-toggle">
                <button type="button" class="toggle-btn active" id="ytToggle">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path
                            d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4s-6.254,0-7.814,0.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M10,15.464V8.536L16,12L10,15.464z" />
                    </svg>
                    YouTube
                </button>
                <button type="button" class="toggle-btn" id="ttToggle">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path
                            d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.95v5.26c.01 2.45-1.13 4.98-3.32 6.13-2.12 1.12-4.81 1.05-6.85-.21-2.06-1.28-3.15-3.83-2.61-6.19.53-2.3 2.66-4.08 4.96-4.26 2.37-.18 4.8.84 6.2 2.7 0-3.9 0-7.79 0-11.69-.79-.02-1.58-.02-2.38-.02-.03 2.22-1.35 4.39-3.4 5.3-2.14.94-4.8.54-6.55-1-1.77-1.56-2.52-4.14-1.71-6.42C1.72 4.41 4.1 2.42 6.64 2.22 8.94 2.05 11.4 3.12 12.525 5.02c.03-1.67.01-3.34.02-5z" />
                    </svg>
                    TikTok
                </button>
            </div>
            <form id="downloadForm">
                <div class="input-group">
                    <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." required
                        autocomplete="off">
                    <button type="submit" id="fetchBtn" class="primary-btn">
                        <span class="btn-text">Get Video</span>
                        <div class="spinner hidden"></div>
                    </button>
                </div>
            </form>
        </section>

        <!-- Result Card (Hidden by default) -->
        <section id="resultCard" class="glass-card result-container hidden">
            <div class="video-info">
                <div class="thumbnail-wrapper">
                    <img id="videoThumb" src="" alt="Video Thumbnail">
                </div>
                <div class="details">
                    <h3 id="videoTitle">Video Title</h3>
                    <p class="duration">Duration: <span id="videoDuration">0:00</span></p>

                    <div class="download-controls">
                        <select id="formatSelect" class="styled-select">
                            <!-- Populated dynamically -->
                        </select>
                        <button id="startDownloadBtn" class="primary-btn pulse">
                            <span>Download Now</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Progress Section (Hidden by default) -->
            <div id="progressSection" class="progress-section hidden">
                <div class="progress-header">
                    <span id="progressStatusText">Starting download...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progressBar" class="progress-bar-fill"></div>
                </div>

                <a id="finalDownloadLink" class="success-btn hidden" download>
                    Save File to Device
                </a>
            </div>
        </section>
    </main>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js"></script>
</body>

</html>
